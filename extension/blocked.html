<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Blocked — FocusBlock</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .wrap {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 32px;
      text-align: center;
    }
    .badge {
      font-size: 14px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #38bdf8;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 36px;
      margin: 0 0 12px;
      font-weight: 600;
    }
    .domain {
      font-size: 20px;
      color: #f87171;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      margin-bottom: 24px;
      word-break: break-all;
    }
    p {
      max-width: 520px;
      line-height: 1.6;
      color: #94a3b8;
      margin: 0 0 24px;
    }
    .hint {
      font-size: 13px;
      color: #64748b;
    }
    kbd {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 2px 6px;
      font-family: ui-monospace, monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badge">FocusBlock</div>
    <h1>This site is blocked.</h1>
    <div class="domain" id="domain">—</div>
    <p>You hit your daily limit, or this domain is on your blocklist. Open FocusBlock to adjust.</p>
    <div class="hint">Manage from the FocusBlock desktop app · auto-unblocks at midnight</div>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
